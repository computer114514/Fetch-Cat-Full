<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .jianli {
      border: 1px solid #000;
      margin: 0 auto;
      width: 800px;
      background-color: #F5F5F5;
    }

    .information .photo {

      display: inline-block;
      height: 200px;
      width: 120px;

      width: 100%;

    }

    .information .real-information {

      display: flex;
      flex-direction: column;
      vertical-align: top;
      display: inline-block;
      height: 200px;
      width: 550px;
      padding: 0 20px;
    }

    .information .real-information div {

      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      height: 100px;
      margin: 20px 20px;
    }

    .information .real-information h1 {
      margin: 20px;
    }

    .modules{
      margin: 10px 18px;
    }
  </style>
</head>

          <span>github：https://github.com/</span>
          <span>电话：19709291876</span>
          <span>邮箱：3058094441@qq.com</span>

    </div>
